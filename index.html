<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LongTimeGenie Tree</title>
  <meta name="description" content="Genealogy research tool — load, view, and annotate family trees." />
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#2d5016" />
  <meta name="application-name" content="LongTimeGenie Tree" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="LTG Tree" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="icon" type="image/svg+xml" href="./icon.svg" />
  <link rel="apple-touch-icon" href="./icon.svg" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="brand__mark" aria-hidden="true">𓊝</span>
      <div class="brand__text">
        <h1 class="brand__name">LongTimeGenie Tree</h1>
        <p class="brand__tag">Genealogy research workspace</p>
      </div>
      <div class="header-actions" id="header-actions" hidden>
        <span class="loaded-pill" id="loaded-pill"></span>
        <button class="btn btn--ghost" id="btn-reload" type="button">Load different file</button>
        <button class="btn btn--ghost" id="btn-toggle-json" type="button">Show raw JSON</button>
      </div>
    </div>
  </header>

  <main class="app-main">
    <section class="importer" id="importer">
      <h2 class="section-title">Load a GEDCOM file</h2>
      <p class="section-help">All data stays in your browser. Nothing is uploaded.</p>

      <div class="dropzone" id="dropzone" tabindex="0">
        <input type="file" id="file-input" accept=".ged,.gedcom,text/plain" hidden />
        <label for="file-input" class="dropzone__label">
          <strong>Choose a .ged file</strong>
          <span>or drag &amp; drop one here</span>
        </label>
      </div>

      <p class="status" id="status" role="status" aria-live="polite"></p>
    </section>

    <section class="workspace" id="workspace" hidden>
      <aside class="pane pane--list">
        <div class="pane__head">
          <h2 class="section-title">People</h2>
          <input
            type="search"
            class="search-input"
            id="search-input"
            placeholder="Search by name…"
            aria-label="Search people"
          />
          <p class="pane__hint" id="list-summary"></p>
        </div>
        <div class="person-list" id="person-list" role="listbox" tabindex="0"></div>
      </aside>

      <section class="pane pane--center">
        <div class="pane__head pane__head--with-toggle">
          <div class="view-toggle" role="tablist" aria-label="View mode">
            <button class="view-toggle__btn view-toggle__btn--active" type="button" data-view="tree" role="tab">Tree</button>
            <button class="view-toggle__btn" type="button" data-view="timeline" role="tab">Timeline</button>
          </div>
          <p class="pane__hint" id="view-hint">Click any person to re-center the tree.</p>
        </div>
        <div class="view-canvas" id="view-canvas" aria-live="polite"></div>
      </section>

      <aside class="pane pane--detail">
        <div class="pane__head">
          <h2 class="section-title">Details</h2>
        </div>
        <div class="detail-content" id="detail-content"></div>
      </aside>
    </section>

    <section class="output" id="output" hidden>
      <div class="output__header">
        <h2 class="section-title">Raw parsed data</h2>
        <div class="summary" id="summary"></div>
      </div>
      <pre class="json-view" id="json-view"></pre>
    </section>
  </main>

  <footer class="app-footer">
    <small>LongTimeGenie Tree · v0.2 · all data stays local</small>
  </footer>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
